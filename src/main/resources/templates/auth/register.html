<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | E-Voting'">Register | E-Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div th:replace="~{fragments/toast :: toast}"></div>

    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="card border-0 shadow">
                        <div class="card-body p-4 p-md-5">
                            <h3 class="fw-bold mb-2">Create Voter Account</h3>
                            <p class="text-secondary mb-4">Register to participate in secure online elections.</p>

                            <div class="alert alert-danger" th:if="${registrationError}" th:text="${registrationError}">
                            </div>

                            <form th:action="@{/register}" th:object="${registrationRequest}" method="post"
                                enctype="multipart/form-data" novalidate>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="fullName" class="form-label">Full Name</label>
                                        <input id="fullName" type="text" th:field="*{fullName}" class="form-control"
                                            autocomplete="off"
                                            th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{fullName}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="username" class="form-label">Username</label>
                                        <input id="username" type="text" th:field="*{username}" class="form-control"
                                            autocomplete="off"
                                            th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{username}"></div>
                                    </div>
                                    <div class="col-12">
                                        <label for="email" class="form-label">Email Address</label>
                                        <input id="email" type="email" th:field="*{email}" class="form-control"
                                            autocomplete="off"
                                            th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{email}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="password" class="form-label">Password</label>
                                        <input id="password" type="password" th:field="*{password}" class="form-control"
                                            autocomplete="new-password"
                                            th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{password}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                                        <input id="confirmPassword" type="password" th:field="*{confirmPassword}"
                                            class="form-control" autocomplete="new-password"
                                            th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'">
                                        <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                                    </div>
                                    <div class="col-12">
                                        <label for="profilePhoto" class="form-label">Profile Photo (optional)</label>
                                        <input id="profilePhoto" type="file" th:field="*{profilePhoto}"
                                            class="form-control" accept="image/png,image/jpeg,image/jpg,image/webp">
                                    </div>
                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>
                                    </div>
                                </div>
                            </form>

                            <p class="text-center mt-4 mb-0">
                                Already have an account?
                                <a th:href="@{/login}" class="text-decoration-none fw-semibold">Login here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
