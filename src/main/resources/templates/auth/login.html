<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | E-Voting'">Login | E-Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div th:replace="~{fragments/toast :: toast}"></div>

    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-5">
                    <div class="card border-0 shadow">
                        <div class="card-body p-4 p-md-5">
                            <h3 class="fw-bold mb-2">Welcome Back</h3>
                            <p class="text-secondary mb-4">Sign in to continue to your E-Voting dashboard.</p>

                            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">
                            </div>
                            <div class="alert alert-danger" th:if="${loginError}" th:text="${loginError}"></div>

                            <form method="post" th:action="@{/login}" th:object="${loginRequest}" novalidate>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input id="email" type="email" th:field="*{email}" class="form-control"
                                        placeholder="name@example.com" autocomplete="off"
                                        th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{email}"></div>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input id="password" type="password" th:field="*{password}" class="form-control"
                                        placeholder="Enter password" autocomplete="new-password"
                                        th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{password}"></div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Login</button>
                            </form>

                            <p class="text-center mt-4 mb-0">
                                New voter?
                                <a th:href="@{/register}" class="text-decoration-none fw-semibold">Create account</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
