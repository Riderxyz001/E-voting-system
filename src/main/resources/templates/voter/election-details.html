<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | E-Voting'">Active Elections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="voter-dashboard-bg">
    <div class="container-fluid py-3 px-lg-4">
        <div class="card border-0 shadow-sm dashboard-shell">
            <div class="card-body p-0">
                <div th:replace="~{fragments/toast :: toast}"></div>
                <div th:replace="~{fragments/voter-topbar-compact :: topbar}"></div>

                <div class="row g-0">
                    <aside class="col-lg-2 border-end dashboard-sidebar">
                        <div class="p-3">
                            <a th:href="@{/home}" class="sidebar-link"
                                th:classappend="${activeMenu == 'home'} ? 'active'">
                                <i class="bi bi-house-door-fill me-2"></i> Home
                            </a>
                            <a th:href="@{/voter/dashboard}" class="sidebar-link"
                                th:classappend="${activeMenu == 'dashboard'} ? 'active'">
                                <i class="bi bi-grid-1x2-fill me-2"></i> Dashboard
                            </a>
                            <a th:href="@{/voter/active-elections}" class="sidebar-link"
                                th:classappend="${activeMenu == 'active-elections'} ? 'active'">
                                <i class="bi bi-calendar2-check-fill me-2"></i> Active Elections
                            </a>
                            <a th:href="@{/voter/my-votes}" class="sidebar-link"
                                th:classappend="${activeMenu == 'my-votes'} ? 'active'">
                                <i class="bi bi-check2-square me-2"></i> My Votes
                            </a>
                            <a th:href="@{/voter/results}" class="sidebar-link"
                                th:classappend="${activeMenu == 'results'} ? 'active'">
                                <i class="bi bi-bar-chart-fill me-2"></i> Results
                            </a>
                            <a th:href="@{/voter/profile}" class="sidebar-link"
                                th:classappend="${activeMenu == 'profile'} ? 'active'">
                                <i class="bi bi-person-circle me-2"></i> Profile
                            </a>
                            <a th:href="@{/voter/notifications}" class="sidebar-link"
                                th:classappend="${activeMenu == 'notifications'} ? 'active'">
                                <i class="bi bi-bell-fill me-2"></i> Notifications
                            </a>
                            <a th:href="@{/signout}"
                                class="sidebar-link text-danger fw-bold sidebar-link-logout mt-4 border border-danger-subtle">
                                <i class="bi bi-box-arrow-right me-2"></i> Logout
                            </a>
                        </div>
                    </aside>

                    <section class="col-lg-10 p-3 p-lg-4">
                        <div class="mb-4">
                            <a th:href="@{/voter/active-elections}" class="text-decoration-none mb-3 d-inline-block">
                                <i class="bi bi-arrow-left me-1"></i> Back to Elections
                            </a>
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h4 class="fw-bold mb-1" th:text="${election.title}">Election Title</h4>
                                    <span class="badge" th:classappend="${statusBadgeClass}"
                                        th:text="${election.getCalculatedStatus()}">Status</span>
                                </div>
                                <a th:href="@{'/voter/elections/' + ${election.id} + '/vote'}" class="btn btn-primary"
                                    th:classappend="${election.getCalculatedStatus() != T(com.evoting.evotingsystem.entity.ElectionStatus).ACTIVE} ? ' disabled'">
                                    <i class="bi bi-check2-circle me-1"></i> Vote Now
                                </a>
                            </div>
                        </div>

                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-body p-4">
                                <h6 class="fw-bold mb-3">About this Election</h6>
                                <p class="text-secondary mb-4" th:text="${election.description}">Description</p>

                                <div class="row g-4">
                                    <div class="col-md-4">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="bg-primary-subtle text-primary rounded p-2">
                                                <i class="bi bi-calendar-event fs-4"></i>
                                            </div>
                                            <div>
                                                <small class="text-secondary d-block">Start Date</small>
                                                <strong
                                                    th:text="${#temporals.format(election.startsAt, 'dd MMM yyyy, hh:mm a')}">Start
                                                    Date</strong>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="bg-danger-subtle text-danger rounded p-2">
                                                <i class="bi bi-calendar-x fs-4"></i>
                                            </div>
                                            <div>
                                                <small class="text-secondary d-block">End Date</small>
                                                <strong
                                                    th:text="${#temporals.format(election.endsAt, 'dd MMM yyyy, hh:mm a')}">End
                                                    Date</strong>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="d-flex align-items-center gap-3">
                                            <div class="bg-success-subtle text-success rounded p-2">
                                                <i class="bi bi-people fs-4"></i>
                                            </div>
                                            <div>
                                                <small class="text-secondary d-block">Total Candidates</small>
                                                <strong th:text="${election.candidates.size()}">0</strong>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
