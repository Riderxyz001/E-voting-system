<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">
            E-Voting System
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item" th:if="${session.AUTH_USER_ID == null}">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item" th:if="${session.AUTH_USER_ID == null}">
                    <a class="nav-link" th:href="@{/register}">Register</a>
                </li>
                <li class="nav-item" th:if="${session.AUTH_USER_ID != null}">
                    <a class="nav-link" th:href="@{/voter/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" th:if="${session.AUTH_USER_ID != null}">
                    <a class="nav-link text-danger" th:href="@{/signout}">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
