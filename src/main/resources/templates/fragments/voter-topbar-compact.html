<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="topbar" class="dashboard-topbar d-flex justify-content-between align-items-center px-4 py-3 border-bottom bg-primary text-white">
        <!-- Left: Brand -->
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-shield-check fs-4"></i>
            <h5 class="mb-0 fw-bold">E-Voting Dashboard</h5>
        </div>

        <!-- Right: User Profile & Notifications -->
        <div class="d-flex align-items-center gap-3">
            <!-- Notifications Bell -->
            <a th:href="@{/voter/notifications}" class="text-white text-decoration-none position-relative me-2">
                <i class="bi bi-bell fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      th:if="${pageData.unreadNotifications > 0}"
                      th:text="${pageData.unreadNotifications}">0</span>
            </a>

            <!-- Clickable Profile Section -->
            <a th:href="@{/voter/profile}" class="d-flex align-items-center gap-2 text-white text-decoration-none profile-clickable-section">
                <div class="avatar-circle avatar-topbar overflow-hidden border border-2 border-white border-opacity-25">
                    <img th:if="${pageData.profileImagePath}" th:src="@{${pageData.profileImagePath}}"
                         alt="Profile" style="width:100%;height:100%;object-fit:cover;">
                    <span th:if="${pageData.profileImagePath == null}"
                          th:text="${#strings.substring(pageData.fullName,0,1).toUpperCase()}">U</span>
                </div>
                <div>
                    <p class="mb-0 fw-semibold" th:text="${pageData.fullName}">Full Name</p>
                    <span class="badge bg-white bg-opacity-25 text-white" style="font-size: 0.7rem;" th:text="${pageData.role}">VOTER</span>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
