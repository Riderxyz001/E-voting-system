<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="toast">
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;">
        <div id="appToast"
             class="toast align-items-center text-bg-success border-0"
             role="alert"
             aria-live="assertive"
             aria-atomic="true"
             th:if="${toastMessage}"
             th:classappend="${toastType == 'error'} ? ' text-bg-danger' : (${toastType == 'warning'} ? ' text-bg-warning' : ' text-bg-success')">
            <div class="d-flex">
                <div class="toast-body" th:text="${toastMessage}">Action completed.</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script th:if="${toastMessage}">
        document.addEventListener('DOMContentLoaded', function () {
            var el = document.getElementById('appToast');
            if (el) {
                var toast = new bootstrap.Toast(el, { delay: 3500 });
                toast.show();
            }
        });
    </script>
</div>
</body>
</html>
