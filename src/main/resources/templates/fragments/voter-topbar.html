<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="topbar" class="dashboard-topbar d-flex justify-content-between align-items-center px-4 py-3 border-bottom bg-primary text-white">
        <!-- Left: Brand -->
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-shield-check fs-4"></i>
            <h5 class="mb-0 fw-bold">E-Voting Dashboard</h5>
        </div>

        <!-- Middle: Navigation Links (Expanded) -->
        <div class="d-none d-lg-flex align-items-center gap-4 mx-auto">
            <a th:href="@{/home}" class="topbar-nav-link text-white text-decoration-none d-flex align-items-center gap-2 px-2 py-1 rounded"
               th:classappend="${activeMenu == 'home'} ? 'active-topbar' : ''">
                <i class="bi bi-house-door-fill"></i>
                <span>Home</span>
            </a>
            <a th:href="@{/voter/dashboard}" class="topbar-nav-link text-white text-decoration-none d-flex align-items-center gap-2 px-2 py-1 rounded"
               th:classappend="${activeMenu == 'dashboard'} ? 'active-topbar' : ''">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>
            <a th:href="@{/voter/active-elections}" class="topbar-nav-link text-white text-decoration-none d-flex align-items-center gap-2 px-2 py-1 rounded"
               th:classappend="${activeMenu == 'active-elections'} ? 'active-topbar' : ''">
                <i class="bi bi-calendar2-check-fill"></i>
                <span>Active Elections</span>
            </a>
            <a th:href="@{/voter/my-votes}" class="topbar-nav-link text-white text-decoration-none d-flex align-items-center gap-2 px-2 py-1 rounded"
               th:classappend="${activeMenu == 'my-votes'} ? 'active-topbar' : ''">
                <i class="bi bi-check2-square"></i>
                <span>My Votes</span>
            </a>
            <a th:href="@{/voter/results}" class="topbar-nav-link text-white text-decoration-none d-flex align-items-center gap-2 px-2 py-1 rounded"
               th:classappend="${activeMenu == 'results'} ? 'active-topbar' : ''">
                <i class="bi bi-bar-chart-fill"></i>
                <span>Results</span>
            </a>
        </div>

        <!-- Right: User Profile & Notifications -->
        <div class="d-flex align-items-center gap-3">
            <!-- Notifications Bell -->
            <a th:href="@{/voter/notifications}" class="text-white text-decoration-none position-relative me-2">
                <i class="bi bi-bell fs-5"></i>
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                      th:if="${pageData.unreadNotifications > 0}"
                      th:text="${pageData.unreadNotifications}">0</span>
            </a>

            <!-- Clickable Profile Section -->
            <a th:href="@{/voter/profile}" class="d-flex align-items-center gap-2 text-white text-decoration-none profile-clickable-section">
                <div class="avatar-circle avatar-topbar overflow-hidden border border-2 border-white border-opacity-25">
                    <img th:if="${pageData.profileImagePath}" th:src="@{${pageData.profileImagePath}}"
                         alt="Profile" style="width:100%;height:100%;object-fit:cover;">
                    <span th:if="${pageData.profileImagePath == null}"
                          th:text="${#strings.substring(pageData.fullName,0,1).toUpperCase()}">U</span>
                </div>
                <div class="d-none d-md-block">
                    <p class="mb-0 fw-semibold lh-1" th:text="${pageData.fullName}">Full Name</p>
                    <span class="badge bg-white bg-opacity-25 text-white mt-1" style="font-size: 0.65rem;" th:text="${pageData.role}">VOTER</span>
                </div>
            </a>

            <!-- Quick Logout (Optional, if requested) -->
            <div class="border-start border-white border-opacity-25 ps-3 ms-2">
                <a th:href="@{/signout}" class="text-white text-decoration-none d-flex align-items-center gap-1 opacity-75 hover-opacity-100">
                    <i class="bi bi-box-arrow-right fs-5"></i>
                    <span class="d-none d-xl-inline small fw-bold">Logout</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
