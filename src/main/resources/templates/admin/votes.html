<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${pageTitle} + ' | E-Voting'">Votes</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body class="voter-dashboard-bg"><div class="container-fluid py-3 px-lg-4"><div class="card border-0 shadow-sm dashboard-shell"><div class="card-body p-0"><div th:replace="~{admin/fragments/layout :: topbar(${shell})}"></div><div class="row g-0"><aside th:replace="~{admin/fragments/layout :: sidebar(${activeMenu})}"></aside>
<section class="col-lg-10 p-3 p-lg-4"><h4 class="fw-bold mb-1">Votes</h4><p class="text-secondary">Track live vote records across elections.</p>
<form class="row g-2 mb-3" method="get" th:action="@{/admin/votes}"><div class="col-md-4"><select class="form-select" name="electionId"><option value="">All Elections</option><option th:each="e : ${electionsList.content}" th:value="${e.id}" th:text="${e.title}" th:selected="${selectedElectionId == e.id}"></option></select></div><div class="col-md-2"><button class="btn btn-outline-primary w-100">Filter</button></div></form>
<div class="card border-0 shadow-sm"><div class="table-responsive"><table class="table align-middle mb-0 my-votes-table"><thead><tr><th>Voter</th><th>Election</th><th>Candidate</th><th>Voted At</th><th>Status</th></tr></thead><tbody>
<tr th:if="${#lists.isEmpty(votes.content)}"><td colspan="5" class="text-center py-4 text-secondary">No votes found.</td></tr>
<tr th:each="v : ${votes.content}"><td th:text="${v.voterName}"></td><td th:text="${v.electionTitle}"></td><td th:text="${v.candidateName}"></td><td th:text="${#temporals.format(v.votedAt,'dd MMM yyyy, hh:mm a')}"></td><td><span class="badge text-bg-success-subtle text-success-emphasis">Valid</span></td></tr>
</tbody></table></div></div></section></div></div></div></div></body></html>
