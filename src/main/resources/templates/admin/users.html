<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${pageTitle} + ' | E-Voting'">Users</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body class="voter-dashboard-bg"><div class="container-fluid py-3 px-lg-4"><div class="card border-0 shadow-sm dashboard-shell"><div class="card-body p-0"><div th:replace="~{admin/fragments/layout :: topbar(${shell})}"></div><div class="row g-0"><aside th:replace="~{admin/fragments/layout :: sidebar(${activeMenu})}"></aside>
<section class="col-lg-10 p-3 p-lg-4"><h4 class="fw-bold mb-1">Users</h4><p class="text-secondary">Manage user accounts and access roles.</p>
<form class="row g-2 mb-3" method="get" th:action="@{/admin/users}"><div class="col-md-4"><input class="form-control" name="q" th:value="${search}" placeholder="Search users"></div><div class="col-md-3"><select class="form-select" name="role"><option value="ALL" th:selected="${role=='ALL'}">All Roles</option><option value="ADMIN" th:selected="${role=='ADMIN'}">Admin</option><option value="VOTER" th:selected="${role=='VOTER'}">Voter</option></select></div><div class="col-md-2"><button class="btn btn-outline-primary w-100">Filter</button></div></form>
<div class="card border-0 shadow-sm"><div class="table-responsive"><table class="table align-middle mb-0 my-votes-table"><thead><tr><th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Last Login</th><th>Actions</th></tr></thead><tbody>
<tr th:if="${#lists.isEmpty(users.content)}"><td colspan="6" class="text-center py-4 text-secondary">No users found.</td></tr>
<tr th:each="u : ${users.content}"><td th:text="${u.fullName}"></td><td th:text="${u.email}"></td><td><span class="badge text-bg-primary-subtle text-primary-emphasis" th:text="${u.role}"></span></td><td><span class="badge" th:classappend="${u.accountStatus == 'Active'} ? ' text-bg-success-subtle text-success-emphasis' : ' text-bg-danger-subtle text-danger-emphasis'" th:text="${u.accountStatus}"></span></td><td th:text="${u.lastLoginAt != null ? #temporals.format(u.lastLoginAt,'dd MMM yyyy, hh:mm a') : 'N/A'}"></td><td><form method="post" th:action="@{'/admin/users/' + ${u.id} + '/status'}" class="d-flex gap-1"><input type="hidden" name="status" th:value="${u.accountStatus == 'Active' ? 'Inactive' : 'Active'}"><button class="btn btn-sm btn-outline-secondary" th:text="${u.accountStatus == 'Active' ? 'Deactivate' : 'Activate'}"></button></form></td></tr>
</tbody></table></div></div></section></div></div></div></div></body></html>
