<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | E-Voting'">Administrator Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card border-0 shadow">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <i class="bi bi-shield-lock-fill text-primary fs-4"></i>
                            <h3 class="fw-bold mb-0">Administrator Portal</h3>
                        </div>
                        <p class="text-secondary mb-2">Secure access for election administrators</p>
                        <span class="badge text-bg-primary-subtle text-primary-emphasis mb-4">ADMIN</span>

                        <div class="alert alert-danger" th:if="${loginError}" th:text="${loginError}"></div>

                        <form method="post" th:action="@{/admin/login}" th:object="${adminLoginRequest}" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input id="email" type="email" th:field="*{email}" class="form-control"
                                       placeholder="admin@example.com"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input id="password" type="password" th:field="*{password}" class="form-control"
                                       placeholder="Enter secure password"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{password}"></div>
                            </div>

                            <div class="small text-secondary mb-3">
                                <i class="bi bi-info-circle me-1"></i>
                                Secure login note: Admin credentials are role-validated before access.
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>

                        <p class="text-center mt-4 mb-0">
                            <a th:href="@{/}" class="text-decoration-none fw-semibold">Back to Home</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
