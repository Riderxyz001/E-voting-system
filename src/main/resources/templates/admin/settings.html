<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${pageTitle} + ' | E-Voting'">Settings</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body class="voter-dashboard-bg"><div class="container-fluid py-3 px-lg-4"><div class="card border-0 shadow-sm dashboard-shell"><div class="card-body p-0"><div th:replace="~{admin/fragments/layout :: topbar(${shell})}"></div><div class="row g-0"><aside th:replace="~{admin/fragments/layout :: sidebar(${activeMenu})}"></aside>
<section class="col-lg-10 p-3 p-lg-4"><h4 class="fw-bold mb-1">Settings</h4><p class="text-secondary">General, security, and system settings.</p>
<div class="row g-4"><div class="col-xl-6"><div class="card border-0 shadow-sm"><div class="card-body"><h6 class="fw-bold mb-3">System Settings</h6>
<div class="result-mini-card mb-2" th:each="s : ${settings}">
<form method="post" th:action="@{/admin/settings/save}" class="row g-2 align-items-center">
<div class="col-4"><label class="small fw-semibold" th:text="${s.settingKey}"></label></div>
<div class="col-6"><input class="form-control form-control-sm" name="settingValue" th:value="${s.settingValue}"></div>
<div class="col-2"><input type="hidden" name="settingKey" th:value="${s.settingKey}"><button class="btn btn-sm btn-primary w-100">Save</button></div>
</form>
<small class="text-secondary" th:text="${s.description}"></small>
</div>
</div></div></div>
<div class="col-xl-6"><div class="card border-0 shadow-sm"><div class="card-body"><h6 class="fw-bold mb-3">Security Settings</h6>
<div class="d-flex justify-content-between border-bottom py-2"><span>Password Policy</span><span class="text-secondary small">Strong</span></div>
<div class="d-flex justify-content-between border-bottom py-2"><span>Session Timeout</span><span class="text-secondary small">30m</span></div>
<div class="d-flex justify-content-between py-2"><span>Two-Factor Auth</span><span class="badge text-bg-success-subtle text-success-emphasis">Enabled</span></div>
</div></div></div></div>
</section></div></div></div></div></body></html>
