<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | E-Voting'">Voters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="voter-dashboard-bg">
    <div class="container-fluid py-3 px-lg-4">
        <div class="card border-0 shadow-sm dashboard-shell">
            <div class="card-body p-0">
                <div th:replace="~{admin/fragments/layout :: topbar(${shell})}"></div>
                <div class="row g-0">
                    <aside th:replace="~{admin/fragments/layout :: sidebar(${activeMenu})}"></aside>
                    <section class="col-lg-10 p-3 p-lg-4">
                        <h4 class="fw-bold mb-1">Voters</h4>
                        <p class="text-secondary">Manage voter records and status.</p>
                        <form class="row g-2 mb-3" method="get" th:action="@{/admin/voters}">
                            <div class="col-md-4"><input class="form-control" name="q" th:value="${search}"
                                    placeholder="Search voters"></div>
                            <div class="col-md-2"><button class="btn btn-outline-primary w-100">Search</button></div>
                        </form>
                        <div class="card border-0 shadow-sm">
                            <div class="table-responsive">
                                <table class="table align-middle mb-0 my-votes-table">
                                    <thead>
                                        <tr>
                                            <th>Voter</th>
                                            <th>Email</th>
                                            <th>Phone</th>
                                            <th>Status</th>
                                            <th>Verification</th>
                                            <th>Registered</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:if="${#lists.isEmpty(voters.content)}">
                                            <td colspan="6" class="text-center py-4 text-secondary">No voters found.
                                            </td>
                                        </tr>
                                        <tr th:each="u : ${voters.content}">
                                            <td th:text="${u.fullName}"></td>
                                            <td th:text="${u.email}"></td>
                                            <td th:text="${u.phoneNumber ?: '-'}"></td>
                                            <td><span class="badge"
                                                    th:classappend="${u.accountStatus == 'Active'} ? ' text-bg-success-subtle text-success-emphasis' : ' text-bg-danger-subtle text-danger-emphasis'"
                                                    th:text="${u.accountStatus}"></span></td>
                                            <td><span class="badge text-bg-primary-subtle text-primary-emphasis"
                                                    th:text="${u.email != null ? 'Verified' : 'Pending'}"></span></td>
                                            <td th:text="${#temporals.format(u.createdAt,'dd MMM yyyy')}"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
