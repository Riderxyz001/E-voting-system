<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${pageTitle} + ' | E-Voting'">Notifications</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body class="voter-dashboard-bg"><div class="container-fluid py-3 px-lg-4"><div class="card border-0 shadow-sm dashboard-shell"><div class="card-body p-0"><div th:replace="~{admin/fragments/layout :: topbar(${shell})}"></div><div class="row g-0"><aside th:replace="~{admin/fragments/layout :: sidebar(${activeMenu})}"></aside>
<section class="col-lg-10 p-3 p-lg-4"><h4 class="fw-bold mb-1">Notifications</h4><p class="text-secondary">Send, track, and manage system notifications.</p>
<form class="card border-0 shadow-sm mb-3" method="post" th:action="@{/admin/notifications/send}"><div class="card-body row g-2">
    <div class="col-md-3"><input class="form-control" name="title" placeholder="Title" required></div>
    <div class="col-md-4"><input class="form-control" name="message" placeholder="Message" required></div>
    <div class="col-md-2"><select class="form-select" name="type"><option value="ELECTION">Election</option><option value="VOTE">Alert</option><option value="ANNOUNCEMENT">Announcement</option><option value="SECURITY">Security</option></select></div>
    <div class="col-md-3"><button class="btn btn-primary w-100">Send Notification</button></div>
</div></form>
<div class="card border-0 shadow-sm"><div class="table-responsive"><table class="table align-middle mb-0 my-votes-table"><thead><tr><th>Title</th><th>Type</th><th>Status</th><th>Sent On</th></tr></thead><tbody>
<tr th:if="${#lists.isEmpty(notifications.content)}"><td colspan="4" class="text-center text-secondary py-4">No notifications yet.</td></tr>
<tr th:each="n : ${notifications.content}"><td><strong th:text="${n.title}"></strong><div class="small text-secondary" th:text="${n.message}"></div></td><td><span class="badge text-bg-primary-subtle text-primary-emphasis" th:text="${n.type}"></span></td><td><span class="badge" th:classappend="${n.readFlag} ? ' text-bg-success-subtle text-success-emphasis' : ' text-bg-warning-subtle text-warning-emphasis'" th:text="${n.readFlag ? 'Sent' : 'Pending'}"></span></td><td th:text="${#temporals.format(n.createdAt,'dd MMM yyyy, hh:mm a')}"></td></tr>
</tbody></table></div></div></section></div></div></div></div></body></html>
