<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | E-Voting'">Elections</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="voter-dashboard-bg">
    <div class="container-fluid py-3 px-lg-4">
        <div class="card border-0 shadow-sm dashboard-shell">
            <div class="card-body p-0">
                <div th:replace="~{admin/fragments/layout :: topbar(${shell})}"></div>
                <div class="row g-0">
                    <aside th:replace="~{admin/fragments/layout :: sidebar(${activeMenu})}"></aside>
                    <section class="col-lg-10 p-3 p-lg-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <h4 class="fw-bold mb-1">Elections</h4>
                                <p class="text-secondary mb-0">Manage elections, status, and participation.</p>
                            </div>
                        </div>

                        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-3" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            <span th:text="${successMessage}">Success!</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-3" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span th:text="${errorMessage}">Error!</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        <form class="row g-2 mb-3" method="get" th:action="@{/admin/elections}">
                            <div class="col-md-4"><input class="form-control" name="q" th:value="${search}"
                                    placeholder="Search elections"></div>
                            <div class="col-md-3"><select class="form-select" name="status">
                                    <option value="ALL" th:selected="${status=='ALL'}">All Status</option>
                                    <option value="UPCOMING" th:selected="${status=='UPCOMING'}">Upcoming</option>
                                    <option value="ACTIVE" th:selected="${status=='ACTIVE'}">Active</option>
                                    <option value="COMPLETED" th:selected="${status=='COMPLETED'}">Completed</option>
                                </select></div>
                            <div class="col-md-2"><button class="btn btn-outline-primary w-100">Filter</button></div>
                        </form>
                        <form class="card border-0 shadow-sm mb-3" method="post" th:action="@{/admin/elections/create}"
                            th:object="${electionForm}">
                            <div class="card-body row g-2">
                                <div class="col-md-3"><input class="form-control" th:field="*{title}"
                                        placeholder="Election Title"
                                        th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{title}"></div>
                                </div>
                                <div class="col-md-3"><input class="form-control" th:field="*{description}"
                                        placeholder="Description"
                                        th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{description}"></div>
                                </div>
                                <div class="col-md-2"><input type="datetime-local" class="form-control"
                                        th:field="*{startsAt}"
                                        th:classappend="${#fields.hasErrors('startsAt')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{startsAt}"></div>
                                </div>
                                <div class="col-md-2"><input type="datetime-local" class="form-control"
                                        th:field="*{endsAt}"
                                        th:classappend="${#fields.hasErrors('endsAt')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{endsAt}"></div>
                                </div>
                                <div class="col-md-2"><button class="btn btn-primary w-100">Create Election</button>
                                </div>
                            </div>
                        </form>
                        <div class="card border-0 shadow-sm">
                            <div class="table-responsive">
                                <table class="table align-middle mb-0 my-votes-table">
                                    <thead>
                                        <tr>
                                            <th>Election</th>
                                            <th>Status</th>
                                            <th>Candidates</th>
                                            <th>Votes</th>
                                            <th>Period</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:if="${#lists.isEmpty(elections.content)}">
                                            <td colspan="6" class="text-center text-secondary py-4">No elections found.
                                            </td>
                                        </tr>
                                        <tr th:each="e : ${elections.content}">
                                            <td><strong th:text="${e.title}">Title</strong>
                                                <div class="small text-secondary" th:text="${e.description}"></div>
                                            </td>
                                            <td>
                                                <span class="badge" th:classappend="${e.getCalculatedStatus().name() == 'ACTIVE' ? 'text-bg-success-subtle text-success-emphasis' : (e.getCalculatedStatus().name() == 'DRAFT' ? 'text-bg-warning-subtle text-warning-emphasis' : 'text-bg-secondary-subtle text-secondary-emphasis')}"
                                                      th:text="${e.getCalculatedStatus()}">UPCOMING</span>
                                            </td>
                                            <td th:text="${candidateCountMap[e.id] ?: 0}">0</td>
                                            <td th:text="${voteCountMap[e.id] ?: 0}">0</td>
                                            <td class="small"><span
                                                    th:text="${#temporals.format(e.startsAt,'dd MMM yyyy')}"></span> -
                                                <span th:text="${#temporals.format(e.endsAt,'dd MMM yyyy')}"></span>
                                            </td>
                                            <td class="d-flex gap-2">
                                                <form th:if="${e.getCalculatedStatus().name() == 'DRAFT'}" method="post"
                                                      th:action="@{'/admin/elections/' + ${e.id} + '/publish'}">
                                                    <button class="btn btn-sm btn-success" title="Minimum 2 candidates required">Publish</button>
                                                </form>
                                                <form method="post"
                                                      th:action="@{'/admin/elections/' + ${e.id} + '/delete'}"
                                                      onsubmit="return confirm('Are you sure you want to delete this election?')">
                                                    <button class="btn btn-sm btn-outline-danger">Delete</button>
                                                </form>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
