<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${pageTitle} + ' | E-Voting'">Reports</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/style.css}"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body class="voter-dashboard-bg"><div class="container-fluid py-3 px-lg-4"><div class="card border-0 shadow-sm dashboard-shell"><div class="card-body p-0"><div th:replace="~{admin/fragments/layout :: topbar(${shell})}"></div><div class="row g-0"><aside th:replace="~{admin/fragments/layout :: sidebar(${activeMenu})}"></aside>
<section class="col-lg-10 p-3 p-lg-4"><div class="d-flex justify-content-between"><div><h4 class="fw-bold mb-1">Reports</h4><p class="text-secondary">Voting trends and election performance reports.</p></div><div><a class="btn btn-outline-primary btn-sm me-2" href="#">Export PDF</a><a class="btn btn-primary btn-sm" href="#">Export Excel</a></div></div>
<div class="row g-3 mb-3"><div class="col-md-3"><div class="dash-stat-card"><small>Total Elections</small><h4 th:text="${totalElections}"></h4></div></div><div class="col-md-3"><div class="dash-stat-card"><small>Total Voters</small><h4 th:text="${totalVoters}"></h4></div></div><div class="col-md-3"><div class="dash-stat-card"><small>Total Votes</small><h4 th:text="${totalVotes}"></h4></div></div><div class="col-md-3"><div class="dash-stat-card"><small>Turnout</small><h4 th:text="${turnout + '%'}"></h4></div></div></div>
<div class="row g-4"><div class="col-xl-6"><div class="card border-0 shadow-sm"><div class="card-body"><h6 class="fw-bold">Turnout Overview</h6><canvas id="turnoutChart" height="170"></canvas></div></div></div><div class="col-xl-6"><div class="card border-0 shadow-sm"><div class="card-body"><h6 class="fw-bold">Recent Elections</h6><div class="result-mini-card mb-2" th:each="e : ${recentElections}"><div class="d-flex justify-content-between"><strong th:text="${e.title}"></strong><span class="small text-secondary" th:text="${e.status}"></span></div></div></div></div></div></div>
<script th:inline="javascript">const turnout=/*[[${turnout}]]*/0;new Chart(document.getElementById('turnoutChart'),{type:'doughnut',data:{labels:['Turnout','Remaining'],datasets:[{data:[turnout,100-turnout],backgroundColor:['#2563eb','#e2e8f0']}]} });</script>
</section></div></div></div></div></body></html>
