<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | E-Voting'">Candidates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="voter-dashboard-bg"><div class="container-fluid py-3 px-lg-4"><div class="card border-0 shadow-sm dashboard-shell"><div class="card-body p-0">
    <div th:replace="~{admin/fragments/layout :: topbar(${shell})}"></div><div class="row g-0"><aside th:replace="~{admin/fragments/layout :: sidebar(${activeMenu})}"></aside>
    <section class="col-lg-10 p-3 p-lg-4"><h4 class="fw-bold mb-1">Candidates</h4><p class="text-secondary">Manage candidate profiles and election mapping.</p>
        <form class="row g-2 mb-3" method="get" th:action="@{/admin/candidates}"><div class="col-md-4"><input class="form-control" name="q" th:value="${search}" placeholder="Search candidates"></div><div class="col-md-2"><button class="btn btn-outline-primary w-100">Search</button></div></form>
        <form class="card border-0 shadow-sm mb-3" method="post" th:action="@{/admin/candidates/create}" th:object="${candidateForm}" enctype="multipart/form-data"><div class="card-body row g-2">
            <div class="col-md-3"><input class="form-control" th:field="*{fullName}" placeholder="Full Name" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"><div class="invalid-feedback" th:errors="*{fullName}"></div></div>
            <div class="col-md-2"><input class="form-control" th:field="*{partyName}" placeholder="Party / Group" th:classappend="${#fields.hasErrors('partyName')} ? 'is-invalid'"><div class="invalid-feedback" th:errors="*{partyName}"></div></div>
            <div class="col-md-2"><input class="form-control" th:field="*{manifesto}" placeholder="Manifesto" th:classappend="${#fields.hasErrors('manifesto')} ? 'is-invalid'"><div class="invalid-feedback" th:errors="*{manifesto}"></div></div>
            <div class="col-md-2"><select class="form-select" th:field="*{electionId}" th:classappend="${#fields.hasErrors('electionId')} ? 'is-invalid'">
                <option value="">Select election</option>
                <option th:each="e : ${electionsList.content}" th:value="${e.id}" th:text="${e.title + ' (' + e.status + ')'}"></option></select><div class="invalid-feedback" th:errors="*{electionId}"></div></div>
            <div class="col-md-2"><input type="file" class="form-control" th:field="*{photo}" accept="image/*"></div>
            <div class="col-md-1"><button class="btn btn-primary w-100">Add</button></div>
        </div></form>
        <div class="card border-0 shadow-sm"><div class="table-responsive"><table class="table align-middle mb-0 my-votes-table"><thead><tr><th>Candidate</th><th>Election</th><th>Party</th><th>Votes</th><th>Status</th><th>Actions</th></tr></thead><tbody>
        <tr th:if="${#lists.isEmpty(candidates.content)}"><td colspan="6" class="text-center py-4 text-secondary">No candidates found.</td></tr>
        <tr th:each="c : ${candidates.content}">
            <td><div class="d-flex align-items-center gap-2">
                <div class="avatar-circle avatar-sm overflow-hidden">
                    <img th:if="${c.imagePath}" th:src="@{${c.imagePath}}" alt="Photo" style="width:100%;height:100%;object-fit:cover;">
                    <span th:if="${c.imagePath == null}" th:text="${#strings.substring(c.fullName,0,1)}"></span>
                </div>
                <span th:text="${c.fullName}"></span>
            </div></td>
            <td th:text="${c.election.title}"></td><td th:text="${c.partyName}"></td><td th:text="${voteCountByCandidate[c.id] ?: 0}"></td>
            <td><span class="badge text-bg-success-subtle text-success-emphasis">Active</span></td>
            <td><form method="post" th:action="@{'/admin/candidates/' + ${c.id} + '/delete'}"><button class="btn btn-sm btn-outline-danger">Delete</button></form></td>
        </tr></tbody></table></div></div>
    </section></div></div></div></div></body></html>
