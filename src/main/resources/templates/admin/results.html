<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title th:text="${pageTitle} + ' | E-Voting'">Results</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/style.css}"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body class="voter-dashboard-bg"><div class="container-fluid py-3 px-lg-4"><div class="card border-0 shadow-sm dashboard-shell"><div class="card-body p-0"><div th:replace="~{admin/fragments/layout :: topbar(${shell})}"></div><div class="row g-0"><aside th:replace="~{admin/fragments/layout :: sidebar(${activeMenu})}"></aside>
<section class="col-lg-10 p-3 p-lg-4"><div class="d-flex justify-content-between align-items-center"><div><h4 class="fw-bold mb-1">Results</h4><p class="text-secondary">Election results, rankings, and detailed metrics.</p></div><a class="btn btn-primary btn-sm" href="#">Export Report</a></div>
<div class="row g-3 mb-3"><div class="col-md-6 col-xl-3"><div class="dash-stat-card"><small>Completed Elections</small><h4 th:text="${#lists.size(completedElections)}"></h4></div></div><div class="col-md-6 col-xl-3"><div class="dash-stat-card"><small>Total Votes</small><h4 th:text="${totalVotes}"></h4></div></div></div>
<div class="row g-4"><div class="col-xl-6"><div class="card border-0 shadow-sm"><div class="card-body"><h6 class="fw-bold">Results Chart</h6><canvas id="resultsChart" height="180"></canvas></div></div></div>
<div class="col-xl-6"><div class="card border-0 shadow-sm"><div class="card-body"><h6 class="fw-bold">Result Summary</h6><div th:if="${#lists.isEmpty(completedElections)}" class="text-secondary">No completed elections yet.</div>
<div class="result-mini-card mb-2" th:each="e : ${completedElections}"><div class="d-flex justify-content-between"><strong th:text="${e.title}"></strong><span class="small text-secondary" th:text="${voteTotals[e.id] ?: 0} + ' votes'"></span></div></div></div></div></div></div>
<script th:inline="javascript">const labels=/*[[${chartLabels}]]*/[];const votes=/*[[${chartValues}]]*/[];new Chart(document.getElementById('resultsChart'),{type:'bar',data:{labels:labels,datasets:[{label:'Votes',data:votes,backgroundColor:'#2563eb'}]},options:{responsive:true,plugins:{legend:{display:false}}}});</script>
</section></div></div></div></div></body></html>
